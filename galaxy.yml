---
namespace: bodsch
name: certs

version: 1.2.0

readme: README.md

authors:
  - Bodo Schulz <bodo@boone-schulz.de>

description: collection of ansible roles for tls certificate handling

license:
  - Apache-2.0

license_file: ''

tags:
  - security
  - certificates
  - ssl
  - tls
  - ca

dependencies:
 ansible.utils: "*"
 bodsch.core: ">=2.13.1"
 bodsch.systemd: ">=1.4.1"
 bodsch.scm: ">=1.10.1"

repository: https://github.com/bodsch/ansible-collection-certs
documentation: https://github.com/bodsch/ansible-collection-certs/README.md
homepage: https://github.com/bodsch/ansible-collection-certs
issues: https://github.com/bodsch/ansible-collection-certs/issues

build_ignore:
  - "galaxy.yml"
  - "*.pyc"
  - "*.retry"
  - ".ansible-lint"
  - ".editorconfig"
  - ".flake8"
  - ".gitignore"
  - ".yamllint"
  - ".github"
  - ".config"
