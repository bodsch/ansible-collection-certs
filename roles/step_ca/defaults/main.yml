---

step_ca_domain: domain.local

step_ca_packages:
  - step-cli
  - step-ca

step_ca_system:
  owner: step-ca
  group: step-ca
  home: /opt/step-ca

step_ca_service:
  state: started
  enabled: true

step_ca_force: false

step_ca_support_acme: false

# e.g. 'cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 64 | head -n 1'
step_ca_init_password: ""

step_ca_admins: []

step_ca_authority:
  name: ""
  listen:
    address: ""
    port: 9000
  dns:
    - localhost
  provisioners: []
  config:
    tls_duration:
      default: 48h
      min: 5m
      max: 168h
    ssh_durations:
      host:
        default: 48h
        min: 5m
        max: 168h
      user:
        default: 48h
        min: 5m
        max: 168h
    disable_renewal: false
    allow_renewal_after_expiry: false

step_ca_admin_connection:
  ca_url: "https://localhost:{{ step_ca_authority.listen.port }}"
  ca_root: "{{ step_ca_system.home }}/.step/certs/root_ca.crt"
  admin_provisioner: admin
  admin_subject: step
  admin_password_file: "{{ step_ca_system.home }}/.step.password"

step_ca_authority_policy: {}

...
