---

- name: disable original systemd units
  when:
    - not running_in_check_mode
    - ansible_facts.service_mgr == 'systemd'
  block:
    - name: create dropin directory
      ansible.builtin.file:
        path: "{{ systemd_etc_directory }}/certbot.service.d"
        state: "directory"
        mode: "0750"
        owner: root
        group: root

    - name: create systemd dropin to using configuration
      ansible.builtin.template:
        src: etc/init/systemd/overwrite.conf.j2
        dest: "{{ systemd_etc_directory }}/certbot.service.d/overwrite.conf"
        mode: "0644"
        owner: root
        group: root
      notify:
        - daemon reload

    - name: mask original certbot.service
      ansible.builtin.service:
        name: certbot.service
        masked: true
      notify:
        - daemon reload
      register: certbot_status

    - name: disable original certbot.timer
      ansible.builtin.service:
        name: certbot.timer
        enabled: false
      failed_when: false
      notify:
        - daemon reload

    - name: flush handlers
      ansible.builtin.meta: flush_handlers

...
